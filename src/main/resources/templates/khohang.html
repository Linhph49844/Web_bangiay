<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kho Hàng - Shop Giày Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
        }

        .nav-link {
            color: white !important;
            font-size: 1.1em;
            padding: 10px 15px;
            transition: transform 0.3s ease, color 0.3s;
        }

        .nav-link:hover {
            color: #ff7eb3 !important;
            transform: scale(1.05);
            text-decoration: underline;
        }

        .footer {
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            font-size: 1em;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
        }

        .table th, .table td {
            vertical-align: middle;
        }

        .table-striped tbody tr:nth-of-type(odd) {
            background-color: #f9f9f9;
        }

        .table-hover tbody tr:hover {
            background-color: #f1f1f1;
        }

        .btn-custom {
            background: #ff5a5f;
            color: white;
            font-size: 1.2em;
            transition: background-color 0.3s ease, transform 0.3s;
        }

        .btn-custom:hover {
            background: #ff3b3f;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="https://cdn-icons-png.flaticon.com/128/869/869636.png" alt="Logo" width="40">
                <strong>Shop Giày</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/nhanvien/hien-thi">🏠 Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/nhanvien/don-hang">📦 Đơn Hàng</a></li>
                    <li class="nav-item"><a class="nav-link" href="/nhanvien/hang-ton">👟 Sản Phẩm</a></li> <!-- Changed the icon here to 👟 -->
                </ul>
            </div>
    </nav>
</header>

<section class="container mt-5">

    <!-- Table to display products and quantities -->
    <table class="table table-striped mt-4">
        <thead>
        <tr>
            <th>ID Sản Phẩm</th>
            <th>Tên Sản Phẩm</th>
            <th>Giá</th>
            <th>Số Lượng Tồn Kho</th>
        </tr>
        </thead>
        <tbody>
        <!-- Example product data, replace with dynamic data from database -->
        <tr>
            <td>#001</td>
            <td>Giày Nike Air Force 1</td>
            <td>1,800,000 VND</td>
            <td>60</td>
        </tr>
        <tr>
            <td>#002</td>
            <td>Giày Adidas NMD</td>
            <td>2,000,000 VND</td>
            <td>50</td>
        </tr>
        <tr>
            <td>#003</td>
            <td>Converse All Star</td>
            <td>1,200,000 VND</td>
            <td>120</td>
        </tr>
        <!-- Add more rows dynamically -->
        </tbody>
    </table>
</section>

<footer class="footer text-white text-center p-3 mt-4">
    <p>&copy; 2025 Shop Giày Online | Liên hệ: shopgiay@example.com</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
