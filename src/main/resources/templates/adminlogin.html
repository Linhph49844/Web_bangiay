<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Admin - Shop Giày Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            font-family: Arial, sans-serif;
        }

        .login-container {
            max-width: 400px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-login {
            background: #ff5a5f;
            border: none;
            width: 100%;
            font-size: 1.2em;
            padding: 10px;
        }

        .btn-login:hover {
            background: #ff3b3f;
        }

        .info-text {
            font-size: 0.9em;
            text-align: center;
            color: white;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2 class="text-center">Đăng nhập Admin</h2>

    <form action="/quanli/login" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Tài khoản</label>
            <input type="text" class="form-control" id="username" name="username" value="admin1" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" id="password" name="password" value="admin123" required>
        </div>
        <button type="submit" class="btn btn-login">Đăng nhập</button>
    </form>

    <div class="info-text">
        <p>Thông tin đăng nhập mặc định:</p>
        <p><strong>Tài khoản:</strong> admin1</p>
        <p><strong>Mật khẩu:</strong> admin123</p>
    </div>
</div>

</body>
</html>
