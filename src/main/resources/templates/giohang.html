<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng - Shop Giày Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar {
            background: rgba(0, 0, 0, 0.85);
            padding: 10px;
        }

        .nav-link {
            color: white !important;
            font-size: 1.1em;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ff7eb3 !important;
            text-decoration: underline;
        }

        body {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            font-family: Arial, sans-serif;
        }

        .footer {
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            font-size: 1em;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
        }

        .table th, .table td {
            text-align: center;
        }

        .table thead {
            background-color: #333;
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="https://cdn-icons-png.flaticon.com/128/869/869636.png" alt="Logo" width="40">
                <strong>Shop Giày</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/sanpham/hien-thi">🏠 Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sanpham/san-pham">👟 Sản phẩm</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sanpham/gio-hang">🛒 Giỏ hàng</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sanpham/lien-he">📞 Liên hệ</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<!-- Danh sách giỏ hàng -->
<section class="container mt-5">
    <h2 class="text-center">Giỏ Hàng của Bạn</h2>
    <table class="table table-bordered text-white">
        <thead>
        <tr>
            <th>Sản phẩm</th>
            <th>Số lượng</th>
            <th>Giá</th>
            <th>Tổng giá</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="gioHang : ${gioHangs}">
            <td th:text="${gioHang.product.name}"></td>
            <td>
                <!-- Cập nhật số lượng -->
                <form th:action="@{/sanpham/gio-hang/cap-nhat/{gioHangId}(gioHangId=${gioHang.id})}" method="POST">
                    <input type="number" name="quantity" th:value="${gioHang.quantity}" min="1" class="form-control" required>
                    <button type="submit" class="btn btn-primary mt-2">Cập nhật</button>
                </form>
            </td>
            <td th:text="${gioHang.product.price}"></td>
            <td th:text="${gioHang.quantity * gioHang.product.price}"></td>
            <td>
                <!-- Xóa sản phẩm -->
                <a th:href="@{/sanpham/gio-hang/xoa/{gioHangId}(gioHangId=${gioHang.id})}" class="btn btn-danger">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="text-center">
        <a href="/sanpham/san-pham" class="btn btn-primary">Tiếp tục mua sắm</a>
        <a href="/sanpham/thanh-toan" class="btn btn-success">Thanh toán</a>
    </div>
</section>

<footer class="footer text-white text-center p-3 mt-4">
    <p>&copy; 2025 Shop Giày Online | Liên hệ: shopgiay@example.com</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
