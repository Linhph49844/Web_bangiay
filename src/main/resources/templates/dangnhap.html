<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Đăng nhập - Glassmorphism Dark</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        /* Background hiệu ứng gradient tối + Glassmorphism */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #000000, #1a1a1a, #262626);
            backdrop-filter: blur(10px);
            font-family: 'Arial', sans-serif;
            color: white;
        }

        /* Hiệu ứng Glassmorphism Dark */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease-in-out;
        }

        /* Hiệu ứng nhập liệu */
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Hiệu ứng nút đăng nhập Neon */
        .btn-glow {
            background: linear-gradient(45deg, #ff1e56, #ffac41);
            color: white;
            font-weight: bold;
            transition: all 0.3s ease-in-out;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 28, 86, 0.5);
        }

        .btn-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 28, 86, 0.8);
        }

        /* Hiệu ứng hiển thị trang */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tài khoản demo */
        .demo-account {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            color: white;
        }

        /* Hiệu ứng chữ phát sáng */
        .login-card h2 {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 75, 43, 0.8);
        }

    </style>
</head>
<body>

<div class="login-card">
    <h2>🚀 Đăng nhập</h2>

    <!-- Thông báo lỗi -->
    <div th:if="${param.error}" class="alert alert-danger text-center">
        ❌ Sai tài khoản hoặc mật khẩu!
    </div>

    <form th:action="@{/giay/dangnhap}" method="post">
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="👤 Tên đăng nhập" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="🔒 Mật khẩu" required>
        </div>

        <button type="submit" class="btn btn-glow w-100">🚀 Đăng nhập</button>
    </form>

    <div class="text-center mt-3">
        <p>Chưa có tài khoản? <a th:href="@{/giay/dangky}" class="text-warning fw-bold">Đăng ký ngay</a></p>
    </div>

    <!-- Tài khoản demo -->
    <div class="demo-account mt-3">
        <strong>Tài khoản demo:</strong> <br>
        👤 <b>User:</b> userdemo <br>
        🔑 <b>Pass:</b> demo123
    </div>
</div>

</body>
</html>
