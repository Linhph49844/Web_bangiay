<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Nhân Viên - Shop Giày Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background: linear-gradient(90deg, red, blue, purple); /* 3 màu: đỏ, xanh, tím */
            background-size: 300% 100%; /* Tạo không gian rộng để hiệu ứng di chuyển */
            animation: rainbow 5s linear infinite; /* Hiệu ứng chạy màu */
            padding: 15px;
        }

        .navbar:hover {
            background-size: 400% 100%; /* Khi hover sẽ tăng độ rộng của gradient */
        }

        .nav-link {
            color: white !important;
            font-size: 1.1em;
            padding: 10px 15px;
            transition: transform 0.3s ease, color 0.3s;
        }

        .nav-link:hover {
            color: #ff7eb3 !important;
            transform: scale(1.05);
            text-decoration: underline;
        }

        .footer {
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            font-size: 1em;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
        }

        @keyframes rainbow {
            0% {
                background-position: 0% 0%;
            }
            50% {
                background-position: 100% 0%;
            }
            100% {
                background-position: 0% 0%;
            }
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/quanli/hien-thi">
                <img src="https://cdn-icons-png.flaticon.com/128/869/869636.png" alt="Logo" width="40">
                <strong>Shop Giày</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/quanli/hien-thi">🏠 Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/quanli/nhan-vien">👨‍💼 Nhân viên</a></li>
                    <li class="nav-item"><a class="nav-link" href="/quanli/khach-hang">👥 Khách hàng</a></li>
                    <li class="nav-item"><a class="nav-link" href="/quanli/san-pham">👟 Sản phẩm</a></li>
                    <li class="nav-item"><a class="nav-link" href="/quanli/doanh-thu">📊 Doanh thu</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<section class="container mt-5">
    <h1 class="text-center">👑 Quản Lý Nhân Viên</h1>

    <!-- Nút "Thêm Nhân Viên" -->
    <div class="text-center mb-3">
        <a href="/quanli/nhan-vien/them" class="btn btn-success">Thêm Nhân Viên</a>
    </div>

    <form method="get" action="/quanli/nhan-vien">
        <input type="text" name="query" placeholder="Tìm kiếm nhân viên theo tên..." class="form-control" />
        <button type="submit" class="btn btn-primary">Tìm kiếm</button>
    </form>

    <!-- Employee table -->
    <table class="table table-striped mt-4">
        <thead>
        <tr>
            <th>ID</th>
            <th>Tên nhân viên</th>
            <th>Tên tài khoản</th>
            <th>Mật khẩu</th>  <!-- Cột mật khẩu -->
            <th>Vai trò</th>
            <th>Trạng thái</th>
            <th>Email</th>
            <th>Số điện thoại</th> <!-- Cột Số điện thoại -->
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="nhanVien : ${listNhanVien}">
            <td th:text="${nhanVien.id}"></td>
            <td th:text="${nhanVien.name}"></td>
            <td th:text="${nhanVien.username}"></td>
            <td th:text="${nhanVien.password}"></td>
            <td th:text="${nhanVien.role.name}"></td>
            <td th:text="${nhanVien.status}"></td>
            <td th:text="${nhanVien.email}"></td>
            <td th:text="${nhanVien.sdt}"></td>  <!-- Hiển thị số điện thoại -->
            <td>
                <!-- Sửa nhân viên -->
                <a href="/quanli/nhan-vien/edit" th:href="@{/quanli/nhan-vien/edit/{id}(id=${nhanVien.id})}" class="btn btn-warning">Chỉnh sửa</a>
            </td>
        </tr>
        </tbody>
    </table>
</section>

<footer class="footer text-white text-center p-3 mt-4">
    <p>&copy; 2025 Shop Giày Online | Liên hệ: shopgiay@example.com</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
